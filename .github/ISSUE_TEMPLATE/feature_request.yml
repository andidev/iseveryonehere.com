name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea that would make Is Everyone Here better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you felt something was missing or could work better.
      placeholder: When running a large event, it's hard to … because …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature you'd like
      description: What should the app do? Feel free to include sketches or examples.
      placeholder: I'd like to be able to …
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you currently use, or other approaches that could work.
    validations:
      required: false

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it often
        - Blocking — I can't use the app without it
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links, references, or additional context.
    validations:
      required: false
