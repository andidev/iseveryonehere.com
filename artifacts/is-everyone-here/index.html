<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>Is Everyone Here – Free Event Attendance Check-In App</title>
    <meta name="description" content="Is Everyone Here is a free, serverless web app for event attendance. Call out names, mark who's present or absent, then track who has left. No account, no server — all data is stored privately in your browser URL and never leaves your device." />
    <meta name="keywords" content="attendance app, event check-in, roll call, who is here, presence tracking, offline attendance, free attendance tool, no account, serverless" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Is Everyone Here" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://iseveryonehere.com/" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, iMessage link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Is Everyone Here" />
    <meta property="og:url" content="https://iseveryonehere.com/" />
    <meta property="og:title" content="Is Everyone Here – Free Event Attendance Check-In App" />
    <meta property="og:description" content="Free serverless web app for event attendance. Add names, mark who's present or absent, and track departures. No account needed — all data is stored only in your browser URL." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@iseveryonehere" />
    <meta name="twitter:title" content="Is Everyone Here – Free Event Attendance Check-In App" />
    <meta name="twitter:description" content="Free serverless web app for event attendance. Add names, mark who's present or absent, and track departures. No account needed — all data is stored only in your browser URL." />

    <!-- Theme colour for mobile browsers -->
    <meta name="theme-color" content="#48AC97" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
