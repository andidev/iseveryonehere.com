<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>Is Everyone Here – Event Attendance Check-In App</title>
    <meta name="description" content="Is Everyone Here is a free, mobile-friendly attendance app for events. Call out names, mark who's present or absent, then track who has left — all without an account or internet connection. State is stored in the URL so you can share it instantly." />
    <meta name="keywords" content="attendance app, event check-in, roll call, who is here, presence tracking, offline attendance, free attendance tool" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Is Everyone Here" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, iMessage link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Is Everyone Here – Event Attendance Check-In App" />
    <meta property="og:description" content="Free mobile-friendly roll-call app. Add names, mark who's present or absent during check-in, and track departures during checkout. No account needed — state lives in the URL." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Is Everyone Here – Event Attendance Check-In App" />
    <meta name="twitter:description" content="Free mobile-friendly roll-call app. Add names, mark who's present or absent during check-in, and track departures during checkout. No account needed — state lives in the URL." />

    <!-- Theme colour for mobile browsers -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
